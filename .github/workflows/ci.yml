name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install ".[dev]"
      - run: python -m ruff check .
      - run: python -m pytest -q

  package:
    name: Build package
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - run: python -m pip install build
      - run: python -m build

  container-smoke:
    name: Container smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - run: docker build --tag kr-gov-job-mcp:ci .
      - run: docker run --detach --rm --publish 18000:8000 --name kr-gov-job-mcp-ci kr-gov-job-mcp:ci
      - name: Verify health and MCP tools
        run: |
          set -o pipefail
          trap 'docker logs kr-gov-job-mcp-ci; docker stop kr-gov-job-mcp-ci' EXIT
          curl --fail --retry 10 --retry-connrefused --retry-delay 1 \
            http://127.0.0.1:18000/health | \
            python -c 'import json, sys; data = json.load(sys.stdin); assert data["status"] == "ok"; assert data["registered_tools"] > 0'
          curl --fail --show-error --request POST http://127.0.0.1:18000/mcp \
            --header 'Content-Type: application/json' \
            --header 'Accept: application/json, text/event-stream' \
            --header 'MCP-Protocol-Version: 2025-11-25' \
            --data '{"jsonrpc":"2.0","id":1,"method":"tools/list","params":{}}' | \
            python -c 'import json, sys; data = json.load(sys.stdin); names = {tool["name"] for tool in data["result"]["tools"]}; assert {"health_check", "lookup_region_codes", "search_public_jobs"} <= names'
